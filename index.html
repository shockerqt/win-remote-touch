<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote Touchpad</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #020617;
            --primary: #6366f1;
            --text-muted: #94a3b8;
            --status-yellow: #eab308;
            --status-green: #22c55e;
            --status-red: #ef4444;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            font-family: 'Inter', system-ui, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #touch-area {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        #status-container {
            position: absolute;
            top: env(safe-area-inset-top, 24px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            margin-top: 24px;
        }

        .status {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            padding: 10px 20px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
        }

        .status::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-yellow);
            box-shadow: 0 0 12px var(--status-yellow);
            transition: all 0.4s ease;
        }

        .status.connected { color: #f8fafc; }
        .status.connected::before {
            background: var(--status-green);
            box-shadow: 0 0 12px var(--status-green);
        }

        .status.disconnected { color: #f8fafc; }
        .status.disconnected::before {
            background: var(--status-red);
            box-shadow: 0 0 12px var(--status-red);
        }

        .title-container {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 40px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            z-index: 5;
            margin-bottom: 40px;
        }

        .title {
            color: rgba(255, 255, 255, 0.15);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.08);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }
        
        .ripple {
            position: absolute;
            width: 80px;
            height: 80px;
            margin-left: -40px;
            margin-top: -40px;
            background: radial-gradient(circle, rgba(99,102,241,0.6) 0%, rgba(99,102,241,0) 70%);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div id="status-container">
        <div id="status" class="status">Connecting...</div>
    </div>

    <div class="title-container">
        <div class="title">Touchpad</div>
        <div class="subtitle">
            1 Finger: Move &middot; Tap: Left Click<br>
            2 Fingers: Scroll &middot; Tap: Right Click<br>
            3 Fingers: Tap: Middle Click
        </div>
    </div>

    <div id="touch-area"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const statusBadge = document.getElementById('status');
            const touchArea = document.getElementById('touch-area');
            
            let ws;
            function connect() {
                ws = new WebSocket(`ws://${location.host}/ws`);
                ws.onopen = () => {
                    statusBadge.textContent = 'Connected';
                    statusBadge.className = 'status connected';
                };
                ws.onclose = () => {
                    statusBadge.textContent = 'Disconnected';
                    statusBadge.className = 'status disconnected';
                    setTimeout(connect, 2000);
                };
                ws.onerror = (err) => {
                    console.error('WebSocket Error:', err);
                    ws.close();
                };
            }
            connect();

            function sendPayload(payload) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(payload));
                }
            }
            
            function createRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 400);
            }

            // Tracking state
            let previousTouches = {};
            let touchStartTime = 0;
            let maxFingers = 0;
            let hasMoved = false;

            touchArea.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchStartTime = Date.now();
                hasMoved = false;
                maxFingers = Math.max(maxFingers, e.touches.length);
                
                for (let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    previousTouches[touch.identifier] = { x: touch.clientX, y: touch.clientY };
                }
            }, { passive: false });

            touchArea.addEventListener('touchmove', (e) => {
                e.preventDefault();
                hasMoved = true;
                
                if (e.touches.length === 1) {
                    // 1 Finger: Mouse Move
                    const touch = e.touches[0];
                    const prev = previousTouches[touch.identifier];
                    if (prev) {
                        const dx = touch.clientX - prev.x;
                        const dy = touch.clientY - prev.y;
                        sendPayload({ action: "MOVE", dx: dx, dy: dy });
                    }
                    previousTouches[touch.identifier] = { x: touch.clientX, y: touch.clientY };
                } 
                else if (e.touches.length === 2) {
                    // 2 Fingers: Scroll (We just track the first finger's delta for simplicity)
                    const touch = e.touches[0];
                    const prev = previousTouches[touch.identifier];
                    if (prev) {
                        const dy = touch.clientY - prev.y;
                        sendPayload({ action: "SCROLL", dx: 0, dy: dy });
                    }
                    // Update all touches
                    for (let i = 0; i < e.touches.length; i++) {
                        const t = e.touches[i];
                        previousTouches[t.identifier] = { x: t.clientX, y: t.clientY };
                    }
                }
            }, { passive: false });

            touchArea.addEventListener('touchend', (e) => {
                e.preventDefault();
                
                // If it was a quick tap without much movement
                const duration = Date.now() - touchStartTime;
                if (e.touches.length === 0 && !hasMoved && duration < 300) {
                    // Visual feedback
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        createRipple(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                    }
                    
                    if (maxFingers === 1) {
                        sendPayload({ action: "CLICK", button: "LEFT" });
                    } else if (maxFingers === 2) {
                        sendPayload({ action: "CLICK", button: "RIGHT" });
                    } else if (maxFingers === 3) {
                        sendPayload({ action: "CLICK", button: "MIDDLE" });
                    }
                }
                
                if (e.touches.length === 0) {
                    maxFingers = 0;
                    previousTouches = {};
                }
            }, { passive: false });
            
            touchArea.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                if (e.touches.length === 0) {
                    maxFingers = 0;
                    previousTouches = {};
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
